    <h2>Contáctanos</h2>

    <p class="texto-contacto">
        Si tienes alguna duda o deseas más información sobre el colesterol y la salud cardiovascular,
        puedes enviarnos un mensaje. Estaremos encantados de ayudarte.
    </p>

    <form class="formulario">

        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Ingresa tu nombre">

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="ejemplo@gmail.com">

        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" placeholder="+502 1234 5678">

        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..."></textarea>

        <button type="submit">Enviar mensaje</button>

    </form>

</section>
